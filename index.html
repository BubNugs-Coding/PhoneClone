<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Phone" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#636464" id="theme-color" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
    <title>Phone</title>
  </head>
  <body>
    <div class="screen" id="passcode-screen">
      <img
        class="wallpaper"
        src="images/homescreen.png"
        alt=""
        draggable="false"
      />

      <div class="dynamic-island" aria-hidden="true">
        <svg class="island-icon lock" viewBox="0 0 24 24" fill="none">
          <path
            d="M7 11V8a5 5 0 0 1 10 0v3"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <rect
            x="5"
            y="11"
            width="14"
            height="10"
            rx="2.5"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        <svg class="island-icon faceid" viewBox="0 0 24 24" fill="none">
          <rect
            x="3"
            y="3"
            width="18"
            height="18"
            rx="4"
            stroke="currentColor"
            stroke-width="1.75"
          />
          <path
            d="M8.5 9.5v1M15.5 9.5v1M9 15c1.2 1.2 4.8 1.2 6 0"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
          <path
            d="M12 9.5v3.2c0 .5.2.8.7 1"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <main class="passcode">
        <p class="prompt">
          Swipe up for Face&nbsp;ID or<br />
          Enter Passcode
        </p>

        <div class="dots" id="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="keypad" id="keypad" role="group" aria-label="Passcode keypad">
          <button type="button" class="key" data-digit="1">
            <span class="digit">1</span>
          </button>
          <button type="button" class="key" data-digit="2">
            <span class="digit">2</span>
            <span class="letters">ABC</span>
          </button>
          <button type="button" class="key" data-digit="3">
            <span class="digit">3</span>
            <span class="letters">DEF</span>
          </button>
          <button type="button" class="key" data-digit="4">
            <span class="digit">4</span>
            <span class="letters">GHI</span>
          </button>
          <button type="button" class="key" data-digit="5">
            <span class="digit">5</span>
            <span class="letters">JKL</span>
          </button>
          <button type="button" class="key" data-digit="6">
            <span class="digit">6</span>
            <span class="letters">MNO</span>
          </button>
          <button type="button" class="key" data-digit="7">
            <span class="digit">7</span>
            <span class="letters">PQRS</span>
          </button>
          <button type="button" class="key" data-digit="8">
            <span class="digit">8</span>
            <span class="letters">TUV</span>
          </button>
          <button type="button" class="key" data-digit="9">
            <span class="digit">9</span>
            <span class="letters">WXYZ</span>
          </button>
          <span class="key-spacer" aria-hidden="true"></span>
          <button type="button" class="key" data-digit="0">
            <span class="digit">0</span>
          </button>
          <span class="key-spacer" aria-hidden="true"></span>
        </div>
      </main>

      <footer class="footer">
        <button type="button" class="footer-btn" id="emergency">Emergency</button>
        <button type="button" class="footer-btn" id="cancel">Cancel</button>
      </footer>
    </div>

    <div class="google-screen" id="google-screen" hidden>
      <header class="g-top">
        <button type="button" class="g-icon-btn" aria-label="Apps" id="g-apps">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <circle cx="5" cy="5" r="1.6" fill="#5f6368" />
            <circle cx="12" cy="5" r="1.6" fill="#5f6368" />
            <circle cx="19" cy="5" r="1.6" fill="#5f6368" />
            <circle cx="5" cy="12" r="1.6" fill="#5f6368" />
            <circle cx="12" cy="12" r="1.6" fill="#5f6368" />
            <circle cx="19" cy="12" r="1.6" fill="#5f6368" />
            <circle cx="5" cy="19" r="1.6" fill="#5f6368" />
            <circle cx="12" cy="19" r="1.6" fill="#5f6368" />
            <circle cx="19" cy="19" r="1.6" fill="#5f6368" />
          </svg>
        </button>
        <button type="button" class="g-avatar" aria-label="Account">R</button>
      </header>

      <div class="g-code-sheet" id="g-code-sheet" hidden>
        <div class="g-code-card" role="dialog" aria-labelledby="g-code-title">
          <h2 class="g-code-title" id="g-code-title">Passcode</h2>
          <p class="g-code-value" id="g-code-value">------</p>
          <div class="g-code-actions">
            <button type="button" class="g-code-btn g-code-close" id="g-code-close">
              Close
            </button>
            <button type="button" class="g-code-btn g-code-reset" id="g-code-reset">
              Reset
            </button>
          </div>
        </div>
      </div>

      <main class="g-main">
        <div class="g-logo" aria-label="Google">
          <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
            <path
              fill="#4285F4"
              d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"
            />
            <path
              fill="#EA4335"
              d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"
            />
            <path
              fill="#FBBC05"
              d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.87h.34v-3.53h9.25zm-8.33 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"
            />
            <path fill="#4285F4" d="M225 3v65h-9.5V3h9.5z" />
            <path
              fill="#34A853"
              d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"
            />
            <path
              fill="#EA4335"
              d="M35.29 41.41V32H67.5c.34 1.76.52 3.78.52 6.05 0 7.48-2.06 16.78-8.65 23.45C53.29 67.9 45.53 72 35.29 72 17.59 72 3 57.74 3 40 3 22.26 17.59 8 35.29 8c9.41 0 16.7 3.69 21.93 8.57l-6.22 6.22c-3.7-3.45-9.66-6.05-15.71-6.05-12.77 0-22.94 10.25-22.94 23.26 0 13.01 10.17 23.26 22.94 23.26 8.4 0 13.19-3.36 16.28-6.47 2.52-2.52 4.16-6.14 4.79-11.08H35.29z"
            />
          </svg>
        </div>

        <form class="g-search" id="g-search" action="#" autocomplete="off">
          <div class="g-search-box">
            <svg class="g-search-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path
                fill="#9aa0a6"
                d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
            <input
              type="search"
              id="g-query"
              name="q"
              placeholder="Search Google or type a URL"
              enterkeyhint="search"
            />
            <button type="button" class="g-tool" aria-label="Voice search">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path
                  fill="#4285F4"
                  d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
                />
                <path
                  fill="#34A853"
                  d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
                />
              </svg>
            </button>
            <button type="button" class="g-tool" aria-label="Google Lens">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path
                  fill="#4285F4"
                  d="M9 3H5c-1.1 0-2 .9-2 2v4h2V5h4V3zm10 0h-4v2h4v4h2V5c0-1.1-.9-2-2-2zM5 15H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm16 0h-2v4h-4v2h4c1.1 0 2-.9 2-2v-4z"
                />
                <circle cx="12" cy="12" r="3.2" fill="#EA4335" />
              </svg>
            </button>
          </div>
        </form>

        <div class="g-shortcuts">
          <button type="button" class="g-shortcut">
            <span class="g-shortcut-icon" style="background: #e8f0fe; color: #1967d2">Y</span>
            <span class="g-shortcut-label">YouTube</span>
          </button>
          <button type="button" class="g-shortcut">
            <span class="g-shortcut-icon" style="background: #e6f4ea; color: #137333">M</span>
            <span class="g-shortcut-label">Maps</span>
          </button>
          <button type="button" class="g-shortcut">
            <span class="g-shortcut-icon" style="background: #fce8e6; color: #c5221f">G</span>
            <span class="g-shortcut-label">Gmail</span>
          </button>
          <button type="button" class="g-shortcut">
            <span class="g-shortcut-icon g-add">+</span>
            <span class="g-shortcut-label">Add shortcut</span>
          </button>
        </div>
      </main>

      <footer class="g-footer">
        <span>Privacy</span>
        <span>Terms</span>
        <span>Settings</span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
