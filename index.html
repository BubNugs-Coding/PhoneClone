<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Phone" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#636464" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
    <title>Phone</title>
  </head>
  <body>
    <div class="screen" id="passcode-screen">
      <img
        class="wallpaper"
        src="images/homescreen.png"
        alt=""
        draggable="false"
      />

      <div class="dynamic-island" aria-hidden="true">
        <svg class="island-icon lock" viewBox="0 0 24 24" fill="none">
          <path
            d="M7 11V8a5 5 0 0 1 10 0v3"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <rect
            x="5"
            y="11"
            width="14"
            height="10"
            rx="2.5"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        <svg class="island-icon faceid" viewBox="0 0 24 24" fill="none">
          <rect
            x="3"
            y="3"
            width="18"
            height="18"
            rx="4"
            stroke="currentColor"
            stroke-width="1.75"
          />
          <path
            d="M8.5 9.5v1M15.5 9.5v1M9 15c1.2 1.2 4.8 1.2 6 0"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
          <path
            d="M12 9.5v3.2c0 .5.2.8.7 1"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <main class="passcode">
        <p class="prompt">
          Swipe up for Face&nbsp;ID or<br />
          Enter Passcode
        </p>

        <div class="dots" id="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div class="keypad" id="keypad" role="group" aria-label="Passcode keypad">
          <button type="button" class="key" data-digit="1">
            <span class="digit">1</span>
          </button>
          <button type="button" class="key" data-digit="2">
            <span class="digit">2</span>
            <span class="letters">ABC</span>
          </button>
          <button type="button" class="key" data-digit="3">
            <span class="digit">3</span>
            <span class="letters">DEF</span>
          </button>
          <button type="button" class="key" data-digit="4">
            <span class="digit">4</span>
            <span class="letters">GHI</span>
          </button>
          <button type="button" class="key" data-digit="5">
            <span class="digit">5</span>
            <span class="letters">JKL</span>
          </button>
          <button type="button" class="key" data-digit="6">
            <span class="digit">6</span>
            <span class="letters">MNO</span>
          </button>
          <button type="button" class="key" data-digit="7">
            <span class="digit">7</span>
            <span class="letters">PQRS</span>
          </button>
          <button type="button" class="key" data-digit="8">
            <span class="digit">8</span>
            <span class="letters">TUV</span>
          </button>
          <button type="button" class="key" data-digit="9">
            <span class="digit">9</span>
            <span class="letters">WXYZ</span>
          </button>
          <span class="key-spacer" aria-hidden="true"></span>
          <button type="button" class="key" data-digit="0">
            <span class="digit">0</span>
          </button>
          <span class="key-spacer" aria-hidden="true"></span>
        </div>
      </main>

      <footer class="footer">
        <button type="button" class="footer-btn" id="emergency">Emergency</button>
        <button type="button" class="footer-btn" id="cancel">Cancel</button>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
